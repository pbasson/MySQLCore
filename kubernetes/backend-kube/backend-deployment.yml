apiVersion: v1
kind: Service
metadata:
  name: backend
spec:
  selector:
    app: mysqlcore-app
  type: LoadBalancer
  ports:
    - port: 5820
      targetPort: 5820
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mysqlcore-app-deployment
spec:
  selector:
    matchLabels:
      app: mysqlcore-app
      tier: backend
  template:
    metadata:
      labels:
        app: mysqlcore-app
        tier: backend
    spec:
      containers:
      - name: mysqlcore-api
        image: mysqlcore-api:latest
        imagePullPolicy: Never
        ports:
        - containerPort: 5820
        resources:
          limits:
            memory: "512Mi"
            cpu: "500m"
          requests:
            memory: "256Mi"
            cpu: "100m"
        env: 
        - name: ASPNETCORE_ENVIRONMENT
          valueFrom:
            configMapKeyRef:
              name: mysqlcore-configmap-dev
              key: core_environment 
        - name: DB_HOST
          valueFrom:
            configMapKeyRef:
              name: mysqlcore-configmap-dev
              key: db_host 
        - name: DB_PORT
          valueFrom:
            configMapKeyRef:
              name: mysqlcore-configmap-dev
              key: db_port 
        - name: MYSQL_DATABASE
          valueFrom:
            configMapKeyRef:
              name: mysqlcore-configmap-dev
              key: mysql_database 
        - name: MYSQL_ROOT_USER
          valueFrom:
            secretKeyRef:
              name: mysqlcore-secret-dev
              key: mysql_root_user 
        - name: MYSQL_ROOT_PASSWORD
          valueFrom:
            secretKeyRef:
              name: mysqlcore-secret-dev
              key: mysql_root_password 
        - name: X-API-KEY
          valueFrom:
            secretKeyRef:
              name: mysqlcore-secret-dev
              key: x_api_key
        - name: SEQ_URL
          valueFrom:
            configMapKeyRef:
              name: mysqlcore-configmap-dev
              key: seq_url
        - name: OTEL_EXPORTER_OTLP_ENDPOINT
          value: http://otel-collector:4317
        livenessProbe:
          tcpSocket:
            port: 5820
          initialDelaySeconds: 20
          periodSeconds: 20
        readinessProbe:
          tcpSocket:
            port: 5820
          initialDelaySeconds: 10
          periodSeconds: 10
